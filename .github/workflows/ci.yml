name: ci

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js (from .nvmrc)
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-1.45.0
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Chromium (with deps)
        run: pnpm --filter @willbuy/capture-worker exec playwright install --with-deps chromium

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

  aggregator:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Aggregator runs the pinned scientific stack inside Docker (spec §17 — the
    # determinism contract holds only inside a byte-identical image digest).
    # We build the image and invoke pytest with the venv inside it.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build aggregator image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/aggregator/Dockerfile
          tags: willbuy-aggregator:ci
          load: true
          cache-from: type=gha,scope=aggregator
          cache-to: type=gha,scope=aggregator,mode=max

      - name: Run aggregator unit + e2e tests
        run: |
          docker run --rm \
            --entrypoint /opt/venv/bin/pytest \
            willbuy-aggregator:ci \
            /app/tests -v
