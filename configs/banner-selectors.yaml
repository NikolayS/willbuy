# Cookie-banner / GDPR-overlay DOM-removal selector list.
#
# Spec §2 #2 + §5.9: capture-worker REMOVES matching elements from the DOM
# at capture time. The broker reads this file at startup and forwards the
# resolved list to the worker as part of its bootstrap (worker integration
# is a thin follow-up — the wire shape is `string[]`).
#
# Owner: browser-automation engineer (CODEOWNERS). Every PR modifying this
# file requires one extra reviewer + a regression-fixture test demonstrating
# the new selector is needed and does not strip primary content (§5.9).
#
# Format: a flat YAML list of CSS selectors. Conservative on purpose —
# unknown banners get flagged via `overlays_unknown_present=true` rather
# than silently removed.
selectors:
  # Generic identifiers
  - "#cookie-banner"
  - "#cookie-consent"
  - "#cookie-notice"
  - "#cookieConsent"
  - "#gdpr-banner"
  - "#gdpr-notice"
  - ".cookie-banner"
  - ".cookie-consent"
  - ".cookie-notice"
  - ".gdpr-banner"
  - ".gdpr-notice"

  # OneTrust (very common; root container only — child controls live inside it)
  - "#onetrust-banner-sdk"
  - "#onetrust-consent-sdk"

  # Cookiebot
  - "#CybotCookiebotDialog"

  # Osano
  - ".osano-cm-window"

  # TrustArc
  - "#truste-consent-track"

  # Quantcast Choice
  - ".qc-cmp2-container"

  # Didomi
  - "#didomi-host"

  # Iubenda
  - "#iubenda-cs-banner"

  # Generic ARIA pattern that's almost always a consent banner when scoped
  # to an obvious id/class. Kept narrow to avoid stripping legitimate
  # dialogs.
  - "[aria-label*='cookie' i]"
  - "[aria-label*='consent' i]"
